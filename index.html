<!DOCTYPE html>
<html>
<head>
<title>Form</title>
</head>
<link rel="stylesheet" type="text/css" href="style.css">
<body style="background-color: aliceblue;">
<h1>User Registration Form</h1>
<form>

    <div>
        <label for="fname">First Name:</label>
        <input type="text" id="fname" placeholder="Jeffrey" required>
    </div>
    <br>
    <div>
        <label for="lname">Last Name:</label>
        <input type="text" id="lname" placeholder="Einstein" required>
    </div>
    <br>
    <div>
        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="jeffrey.e@example.com" required>
    </div>
    <br>
    <div>
        <label for="password">Password:</label>
        <input type="password" id="password" placeholder="Enter your password" required maxlength="12">
    </div>
    <br>
    <div>
        <label for="cpassword">Confirm Password:</label>
        <input type="password" id="cpassword" placeholder="Confirm your password" required maxlength="12">
    </div>
    <br>
    <div>
        <label for="number">Phone Number:</label>
        <input type="tel" id="number" placeholder="123-456-7890" required>
    </div>
    <br>
    <div>
        <label for="city">City:</label>
        <select id="city" required>
            <option value="">Select a city</option>
            <option value="wellington">Wellington</option>
            <option value="auckland">Auckland</option>
            <option value="christchurch">Christchurch</option>
        </select>
    </div>
    <br>
    <div>
        <label for="date">Date of Birth:</label>
        <input type="date" id="date" required>
    </div>
    <br>
    <div>
        <input type="checkbox" id="remember" required>
        <label for="remember">Remember me</label>

        <input type="checkbox" id="receive-emails" required>
        <label for="receive-emails">Receive emails</label>
    </div>
    <br>
    <div>
        <input type="checkbox" id="i-have" required>
        <label for="i-have">I have read and agree to the terms and conditions</label>
    </div>
    <br>

    <a href="terms.html" target="_blank">Terms and Conditions</a>

    <div>
        <button type="reset">Reset</button>
        <button type="submit">Submit</button>
    </div>

</form>

</body>
</html>
